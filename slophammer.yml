typescript:
  coverage:
    threshold: 85
  complexity:
    max: 8
  dry:
    max_findings: 0
    paths:
      - packages
    exclude:
      - "**/*.test.ts"
      - pattern: "**/eslint.config.mjs"
        reason: Independent packages keep self-contained lint configuration for standalone checks.
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation:
    targets:
      - packages/turn-fold/fold-policy.ts
      - packages/turn-fold/mode.ts
      - packages/turn-fold/tool-padding.ts
      - packages/pi-tui-history-replay/history-replay.ts
      - packages/live-stats/live-stats.ts
      - packages/nyan-mode/src/png.ts
      - packages/nyan-mode/src/progress.ts
      - packages/prompt-queue/queue-model.ts
      - packages/prompt-queue/history-model.ts
      - packages/prompt-queue/delivery-policy.ts
      - packages/prompt-queue/submit-policy.ts
      - packages/prompt-queue/message-text.ts
      - packages/prompt-queue/widget-lines.ts
      - packages/prompt-queue/window-state.ts
  dependency_boundaries:
    - from: packages/turn-fold
      allow:
        - packages/turn-fold
    - from: packages/pi-tui-history-replay
      allow:
        - packages/pi-tui-history-replay
    - from: packages/live-stats
      allow:
        - packages/live-stats
    - from: packages/nyan-mode
      allow:
        - packages/nyan-mode
    - from: packages/prompt-queue
      allow:
        - packages/prompt-queue
