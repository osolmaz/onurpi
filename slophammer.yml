typescript:
  coverage:
    threshold: 85
  complexity:
    max: 8
  dry:
    max_findings: 0
    paths:
      - packages
    exclude:
      - "**/*.test.ts"
      - pattern: "**/eslint.config.mjs"
        reason: Independent packages keep self-contained lint configuration for standalone checks.
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation:
    targets:
      - packages/turn-fold/configuration.ts
      - packages/turn-fold/fold-policy.ts
      - packages/turn-fold/mode.ts
      - packages/turn-fold/transcript-window-adapter.ts
      - packages/turn-fold/transcript-windows.ts
      - packages/turn-fold/tool-padding.ts
      - packages/live-stats/live-stats.ts
      - packages/nyan-mode/src/png.ts
      - packages/nyan-mode/src/progress.ts
      - packages/prompt-queue/queue-model.ts
      - packages/prompt-queue/history-model.ts
      - packages/prompt-queue/delivery-policy.ts
      - packages/prompt-queue/submit-policy.ts
      - packages/prompt-queue/message-text.ts
      - packages/prompt-queue/widget-lines.ts
      - packages/prompt-queue/window-state.ts
      - packages/context-window-policy/context-window-policy.ts
      - packages/plan-checklist/plan-context.ts
      - packages/plan-checklist/plan-render.ts
      - packages/plan-checklist/plan-replay.ts
      - packages/plan-checklist/plan-schema.ts
      - packages/plan-checklist/plan-state.ts
      - packages/unified-exec/src/completion.ts
      - packages/unified-exec/src/format-time.ts
      - packages/unified-exec/src/head-tail-buffer.ts
      - packages/unified-exec/src/time.ts
      - packages/unified-exec/src/unescape.ts
      - packages/shell-execution-policy/shell-execution-policy.ts
  dependency_boundaries:
    - from: packages/turn-fold
      allow:
        - packages/turn-fold
    - from: packages/live-stats
      allow:
        - packages/live-stats
    - from: packages/nyan-mode
      allow:
        - packages/nyan-mode
    - from: packages/prompt-queue
      allow:
        - packages/prompt-queue
    - from: packages/context-window-policy
      allow:
        - packages/context-window-policy
    - from: packages/plan-checklist
      allow:
        - packages/plan-checklist
    - from: packages/unified-exec
      allow:
        - packages/unified-exec
    - from: packages/shell-execution-policy
      allow:
        - packages/shell-execution-policy
