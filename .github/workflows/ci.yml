name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: KEEP_SLOPHAMMER_WORKFLOWS=1 npm run slophammer
      - run: npx --no-install slophammer-ts check .
      - name: Check @onurpi/turn-fold package
        working-directory: packages/turn-fold
        run: npm run check
      - name: Check @onurpi/turn-fold package with Slophammer
        working-directory: packages/turn-fold
        run: npm run slophammer
      - name: Check @onurpi/live-stats package
        working-directory: packages/live-stats
        run: npm run check
      - name: Check @onurpi/live-stats package with Slophammer
        working-directory: packages/live-stats
        run: npm run slophammer
      - name: Check @onurpi/nyan-mode package
        working-directory: packages/nyan-mode
        run: npm run check
      - name: Check @onurpi/nyan-mode package with Slophammer
        working-directory: packages/nyan-mode
        run: npm run slophammer
      - name: Check @onurpi/prompt-queue package
        working-directory: packages/prompt-queue
        run: npm run check
      - name: Check @onurpi/prompt-queue package with Slophammer
        working-directory: packages/prompt-queue
        run: npm run slophammer
      - name: Check @onurpi/reliable-compaction package
        working-directory: packages/reliable-compaction
        run: npm run check
      - name: Check @onurpi/reliable-compaction package with Slophammer
        working-directory: packages/reliable-compaction
        run: npm run slophammer
      - name: Check @onurpi/context-window-policy package
        working-directory: packages/context-window-policy
        run: npm run check
      - name: Check @onurpi/context-window-policy package with Slophammer
        working-directory: packages/context-window-policy
        run: npm run slophammer
      - name: Check @onurpi/plan-checklist package
        working-directory: packages/plan-checklist
        run: npm run check
      - name: Check @onurpi/plan-checklist package with Slophammer
        working-directory: packages/plan-checklist
        run: npm run slophammer
      - name: Check @onurpi/unified-exec package
        working-directory: packages/unified-exec
        run: npm run check
      - name: Check @onurpi/unified-exec package with Slophammer
        working-directory: packages/unified-exec
        run: npm run slophammer
  unified-exec-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - name: Typecheck @onurpi/unified-exec
        working-directory: packages/unified-exec
        run: npm run typecheck
      - name: Test @onurpi/unified-exec with PTY
        working-directory: packages/unified-exec
        env:
          EXPECT_PTY: "1"
        run: npm test

  mutation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run mutate
      - name: Mutate @onurpi/turn-fold package
        working-directory: packages/turn-fold
        run: npm run mutate
      - name: Mutate @onurpi/live-stats package
        working-directory: packages/live-stats
        run: npm run mutate
      - name: Mutate @onurpi/nyan-mode package
        working-directory: packages/nyan-mode
        run: npm run mutate
      - name: Mutate @onurpi/prompt-queue package
        working-directory: packages/prompt-queue
        run: npm run mutate
      - name: Mutate @onurpi/reliable-compaction package
        working-directory: packages/reliable-compaction
        run: npm run mutate
      - name: Mutate @onurpi/context-window-policy package
        working-directory: packages/context-window-policy
        run: npm run mutate
      - name: Mutate @onurpi/plan-checklist package
        working-directory: packages/plan-checklist
        run: npm run mutate
      - name: Mutate @onurpi/unified-exec package
        working-directory: packages/unified-exec
        run: npm run mutate
