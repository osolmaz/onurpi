name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx --no-install slophammer-ts check . --execute
      - name: Check @onurpi/turn-fold package
        working-directory: packages/turn-fold
        run: npm run check
      - name: Check @onurpi/turn-fold package with Slophammer
        working-directory: packages/turn-fold
        run: npm run slophammer
      - name: Check pi-tui-history-replay package
        working-directory: packages/pi-tui-history-replay
        run: npm run check
      - name: Check pi-tui-history-replay package with Slophammer
        working-directory: packages/pi-tui-history-replay
        run: npm run slophammer
      - name: Check @onurpi/live-stats package
        working-directory: packages/live-stats
        run: npm run check
      - name: Check @onurpi/live-stats package with Slophammer
        working-directory: packages/live-stats
        run: npm run slophammer

  mutation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run mutate
      - name: Mutate @onurpi/turn-fold package
        working-directory: packages/turn-fold
        run: npm run mutate
      - name: Mutate pi-tui-history-replay package
        working-directory: packages/pi-tui-history-replay
        run: npm run mutate
      - name: Mutate @onurpi/live-stats package
        working-directory: packages/live-stats
        run: npm run mutate
