typescript:
  coverage:
    threshold: 85
  complexity:
    max: 8
  dry:
    max_findings: 0
    paths:
      - .
    exclude:
      - "**/*.test.ts"
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation:
    targets:
      - src/completion.ts
      - src/format-time.ts
      - src/head-tail-buffer.ts
      - src/time.ts
      - src/unescape.ts
  dependency_boundaries:
    - from: .
      allow: []
