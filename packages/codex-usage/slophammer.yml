typescript:
  coverage:
    threshold: 85
  complexity:
    max: 8
  dry:
    max_findings: 0
    paths:
      - .
    exclude:
      - "**/*.test.ts"
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation:
    targets:
      - src/codex-usage.ts
      - src/format.ts
      - src/normalize.ts
  dependency_boundaries:
    - from: .
      allow: []
