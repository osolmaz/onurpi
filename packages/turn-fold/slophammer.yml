typescript:
  coverage:
    threshold: 85
  complexity:
    max: 8
  dry:
    max_findings: 0
    paths:
      - .
    exclude:
      - "**/*.test.ts"
    copied_blocks:
      enabled: true
      min_tokens: 100
  mutation:
    targets:
      - configuration.ts
      - fold-policy.ts
      - mode.ts
      - transcript-window-adapter.ts
      - transcript-windows.ts
      - tool-padding.ts
  dependency_boundaries:
    - from: .
      allow: []
